<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayudantía 2: Ejercicios Euler-Lagrange</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(to bottom, #ffffff 0%, #f5f1e8 100%);
            color: #2c2c2c;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        main {
            width: min(760px, 100%);
            padding: 70px 48px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: #ffffff;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            line-height: 1.2;
            margin-bottom: 18px;
        }

        .divider {
            width: 150px;
            height: 2px;
            margin: 32px auto;
            background: linear-gradient(to right, transparent, #e0a456, transparent);
        }

        p {
            color: #666666;
            font-size: 1.25rem;
            line-height: 1.6;
        }

        a {
            display: inline-block;
            margin-top: 42px;
            color: #e0a456;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main>
        <h1>Ayudantía 2: Ejercicios Euler-Lagrange</h1>
        <div class="divider"></div>
        <p>En construcción.</p>
        <a href="../">Volver al inicio</a>
    </main>
</body>
</html>
