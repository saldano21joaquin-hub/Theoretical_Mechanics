<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREUV Clase 2 - Bloque 1</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #fbf7ef;
            --paper: #ffffff;
            --ink: #2c2c2c;
            --muted: #6f6a61;
            --line: #ded6c9;
            --gold: #e0a456;
            --gold-dark: #b9833f;
            --blue: #2c8da0;
            --red: #d94a3a;
            --green: #4f8f62;
        }

        body {
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--ink);
            overflow: hidden;
        }

        .deck {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .slide {
            position: absolute;
            inset: 0;
            padding: 54px 70px 68px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateX(36px);
            transition: opacity 420ms ease, transform 420ms ease;
            pointer-events: none;
        }

        .slide.present {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .slide.past { transform: translateX(-36px); }

        .content {
            width: min(1120px, 100%);
            max-height: calc(100vh - 122px);
        }

        .eyebrow {
            color: var(--gold-dark);
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            font-size: 0.78rem;
            margin-bottom: 12px;
        }

        h1 {
            font-size: clamp(2.05rem, 4.4vw, 4.4rem);
            line-height: 1.04;
            letter-spacing: 0;
            margin-bottom: 20px;
        }

        h2 {
            font-size: clamp(1.65rem, 3vw, 2.65rem);
            line-height: 1.08;
            letter-spacing: 0;
            margin-bottom: 22px;
        }

        .subtitle {
            font-size: clamp(1.05rem, 1.7vw, 1.45rem);
            color: var(--muted);
            line-height: 1.45;
            max-width: 860px;
        }

        .divider {
            width: 170px;
            height: 3px;
            background: var(--gold);
            margin: 28px 0;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
            align-items: center;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .card {
            background: rgba(255,255,255,0.74);
            border: 1px solid var(--line);
            border-left: 4px solid var(--gold);
            border-radius: 7px;
            padding: 22px 24px;
        }

        .card strong { color: var(--gold-dark); }

        .list {
            display: grid;
            gap: 13px;
            font-size: clamp(1.02rem, 1.75vw, 1.42rem);
            line-height: 1.35;
            color: var(--ink);
        }

        .list div {
            padding-left: 22px;
            position: relative;
        }

        .list div::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0.65em;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--gold);
        }

        .formula {
            display: inline-block;
            background: white;
            border: 1px solid rgba(224, 164, 86, 0.45);
            border-radius: 7px;
            padding: 12px 16px;
            margin: 6px 0;
            font-size: clamp(1.1rem, 1.9vw, 1.55rem);
        }

        .exercise {
            display: grid;
            grid-template-columns: minmax(0, 0.95fr) minmax(420px, 1.05fr);
            gap: 26px;
            align-items: center;
        }

        .exercise.full { grid-template-columns: 1fr; }

        .badge-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 0 0 16px;
        }

        .badge {
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 7px 11px;
            font-size: 0.86rem;
            font-weight: 700;
            color: var(--muted);
            background: white;
        }

        .badge.level { color: var(--gold-dark); border-color: rgba(224,164,86,.55); }

        .problem-text {
            font-size: clamp(1.02rem, 1.55vw, 1.28rem);
            line-height: 1.42;
            color: var(--ink);
        }

        .asks {
            margin-top: 18px;
            display: grid;
            gap: 9px;
            font-size: clamp(0.96rem, 1.38vw, 1.14rem);
        }

        .asks div {
            background: rgba(255,255,255,.72);
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 9px 12px;
        }

        .solution-box {
            background: white;
            border: 1px solid var(--line);
            border-left: 5px solid var(--green);
            border-radius: 7px;
            padding: 22px 24px;
            font-size: clamp(1rem, 1.6vw, 1.34rem);
            line-height: 1.45;
        }

        .solution-box .step {
            margin: 9px 0;
            padding-bottom: 9px;
            border-bottom: 1px solid rgba(222,214,201,.65);
        }

        .solution-box .step:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .visual {
            background: white;
            border: 1px solid var(--line);
            border-radius: 7px;
            padding: 12px;
            min-height: 270px;
        }

        .visual svg {
            width: 100%;
            height: auto;
            display: block;
        }

        .note {
            color: var(--muted);
            font-size: clamp(0.92rem, 1.25vw, 1.08rem);
            line-height: 1.4;
            margin-top: 14px;
        }

        .counter {
            position: fixed;
            left: 26px;
            bottom: 22px;
            color: var(--muted);
            font-weight: 700;
            font-size: 0.95rem;
            z-index: 10;
        }

        .nav {
            position: fixed;
            right: 26px;
            bottom: 18px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .nav button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--line);
            background: white;
            color: var(--ink);
            font-size: 1.25rem;
            cursor: pointer;
            transition: transform 180ms ease, border-color 180ms ease;
        }

        .nav button:hover {
            transform: translateY(-2px);
            border-color: var(--gold);
        }

        .cover .content { max-width: 980px; }
        .cover h1 { font-size: clamp(2.6rem, 5.8vw, 5.4rem); }

        @media (max-width: 860px) {
            .slide { padding: 42px 24px 72px; }
            .grid-2, .exercise { grid-template-columns: 1fr; }
            .grid-3 { grid-template-columns: 1fr; }
            .visual { min-height: 220px; }
        }
    </style>
</head>
<body>
    <div class="deck" id="deck"></div>
    <div class="counter"><span id="current">1</span> / <span id="total">1</span></div>
    <div class="nav">
        <button id="prev" aria-label="Anterior">‹</button>
        <button id="next" aria-label="Siguiente">›</button>
    </div>

    <script>
        const raw = String.raw;

        function graph(points, options = {}) {
            const width = 760;
            const height = 360;
            const margin = { left: 70, right: 34, top: 28, bottom: 56 };
            const xs = points.map(p => p[0]);
            const ys = points.map(p => p[1]);
            const xMin = options.xMin ?? Math.min(0, ...xs);
            const xMax = options.xMax ?? Math.max(...xs);
            const yMin = options.yMin ?? Math.min(0, ...ys);
            const yMax = options.yMax ?? Math.max(...ys);
            const plotW = width - margin.left - margin.right;
            const plotH = height - margin.top - margin.bottom;
            const sx = x => margin.left + (x - xMin) / (xMax - xMin) * plotW;
            const sy = y => margin.top + (yMax - y) / (yMax - yMin) * plotH;
            const xTicks = options.xTicks ?? Array.from({ length: xMax - xMin + 1 }, (_, i) => xMin + i).filter(v => Number.isInteger(v));
            const yTicks = options.yTicks ?? niceTicks(yMin, yMax);
            const poly = points.map(p => `${sx(p[0]).toFixed(1)},${sy(p[1]).toFixed(1)}`).join(" ");
            const zeroY = yMin <= 0 && yMax >= 0 ? sy(0) : sy(yMin);
            const zeroX = xMin <= 0 && xMax >= 0 ? sx(0) : sx(xMin);
            const gridX = xTicks.map(t => `<line x1="${sx(t)}" y1="${margin.top}" x2="${sx(t)}" y2="${height-margin.bottom}" stroke="#eee6d8" stroke-width="1"/>`).join("");
            const gridY = yTicks.map(t => `<line x1="${margin.left}" y1="${sy(t)}" x2="${width-margin.right}" y2="${sy(t)}" stroke="#eee6d8" stroke-width="1"/>`).join("");
            const labelsX = xTicks.map(t => `<text x="${sx(t)}" y="${height-24}" text-anchor="middle" font-size="18" fill="#6f6a61">${t}</text>`).join("");
            const labelsY = yTicks.map(t => `<text x="${margin.left-16}" y="${sy(t)+6}" text-anchor="end" font-size="18" fill="#6f6a61">${t}</text>`).join("");
            const dots = points.map((p, i) => {
                const label = options.labels?.[i] ? `<text x="${sx(p[0])+10}" y="${sy(p[1])-10}" font-size="17" fill="#2c2c2c">${options.labels[i]}</text>` : "";
                return `<circle cx="${sx(p[0])}" cy="${sy(p[1])}" r="6" fill="#e0a456" stroke="#2c2c2c" stroke-width="2"/>${label}`;
            }).join("");
            const area = options.area ? areaSvg(options.area, sx, sy, zeroY) : "";
            const title = options.title ? `<text x="${width/2}" y="22" text-anchor="middle" font-size="20" font-weight="700" fill="#2c2c2c">${options.title}</text>` : "";
            return `<svg viewBox="0 0 ${width} ${height}" role="img" aria-label="${options.title ?? "gráfico"}">
                ${title}
                ${gridX}${gridY}
                <line x1="${margin.left}" y1="${zeroY}" x2="${width-margin.right}" y2="${zeroY}" stroke="#2c2c2c" stroke-width="2.2"/>
                <line x1="${zeroX}" y1="${margin.top}" x2="${zeroX}" y2="${height-margin.bottom}" stroke="#2c2c2c" stroke-width="2.2"/>
                ${area}
                <polyline points="${poly}" fill="none" stroke="${options.color ?? "#e0a456"}" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
                ${dots}
                ${labelsX}${labelsY}
                <text x="${width-margin.right}" y="${height-10}" text-anchor="end" font-size="20" font-weight="700" fill="#2c2c2c">${options.xLabel ?? "t (s)"}</text>
                <text x="${margin.left+2}" y="${margin.top-6}" font-size="20" font-weight="700" fill="#2c2c2c">${options.yLabel ?? "x (m)"}</text>
            </svg>`;
        }

        function multiGraph(series, options = {}) {
            const width = 760;
            const height = 360;
            const margin = { left: 70, right: 34, top: 28, bottom: 56 };
            const all = series.flatMap(s => s.points);
            const xs = all.map(p => p[0]);
            const ys = all.map(p => p[1]);
            const xMin = options.xMin ?? Math.min(0, ...xs);
            const xMax = options.xMax ?? Math.max(...xs);
            const yMin = options.yMin ?? Math.min(0, ...ys);
            const yMax = options.yMax ?? Math.max(...ys);
            const plotW = width - margin.left - margin.right;
            const plotH = height - margin.top - margin.bottom;
            const sx = x => margin.left + (x - xMin) / (xMax - xMin) * plotW;
            const sy = y => margin.top + (yMax - y) / (yMax - yMin) * plotH;
            const xTicks = options.xTicks ?? Array.from({ length: xMax - xMin + 1 }, (_, i) => xMin + i).filter(v => Number.isInteger(v));
            const yTicks = options.yTicks ?? niceTicks(yMin, yMax);
            const zeroY = yMin <= 0 && yMax >= 0 ? sy(0) : sy(yMin);
            const zeroX = xMin <= 0 && xMax >= 0 ? sx(0) : sx(xMin);
            const gridX = xTicks.map(t => `<line x1="${sx(t)}" y1="${margin.top}" x2="${sx(t)}" y2="${height-margin.bottom}" stroke="#eee6d8" stroke-width="1"/>`).join("");
            const gridY = yTicks.map(t => `<line x1="${margin.left}" y1="${sy(t)}" x2="${width-margin.right}" y2="${sy(t)}" stroke="#eee6d8" stroke-width="1"/>`).join("");
            const labelsX = xTicks.map(t => `<text x="${sx(t)}" y="${height-24}" text-anchor="middle" font-size="18" fill="#6f6a61">${t}</text>`).join("");
            const labelsY = yTicks.map(t => `<text x="${margin.left-16}" y="${sy(t)+6}" text-anchor="end" font-size="18" fill="#6f6a61">${t}</text>`).join("");
            const lines = series.map(s => {
                const poly = s.points.map(p => `${sx(p[0]).toFixed(1)},${sy(p[1]).toFixed(1)}`).join(" ");
                const last = s.points[s.points.length - 1];
                return `<polyline points="${poly}" fill="none" stroke="${s.color}" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
                    <text x="${sx(last[0])-8}" y="${sy(last[1])-12}" text-anchor="end" font-size="20" font-weight="800" fill="${s.color}">${s.name}</text>
                    ${s.points.map(p => `<circle cx="${sx(p[0])}" cy="${sy(p[1])}" r="5" fill="${s.color}" stroke="#2c2c2c" stroke-width="1.5"/>`).join("")}`;
            }).join("");
            const title = options.title ? `<text x="${width/2}" y="22" text-anchor="middle" font-size="20" font-weight="700" fill="#2c2c2c">${options.title}</text>` : "";
            return `<svg viewBox="0 0 ${width} ${height}" role="img" aria-label="${options.title ?? "gráfico comparativo"}">
                ${title}
                ${gridX}${gridY}
                <line x1="${margin.left}" y1="${zeroY}" x2="${width-margin.right}" y2="${zeroY}" stroke="#2c2c2c" stroke-width="2.2"/>
                <line x1="${zeroX}" y1="${margin.top}" x2="${zeroX}" y2="${height-margin.bottom}" stroke="#2c2c2c" stroke-width="2.2"/>
                ${lines}
                ${labelsX}${labelsY}
                <text x="${width-margin.right}" y="${height-10}" text-anchor="end" font-size="20" font-weight="700" fill="#2c2c2c">${options.xLabel ?? "t (s)"}</text>
                <text x="${margin.left+2}" y="${margin.top-6}" font-size="20" font-weight="700" fill="#2c2c2c">${options.yLabel ?? "x (m)"}</text>
            </svg>`;
        }

        function niceTicks(min, max) {
            const ticks = [];
            const span = max - min;
            const step = span <= 10 ? 1 : span <= 24 ? 2 : 5;
            const start = Math.ceil(min / step) * step;
            for (let v = start; v <= max; v += step) ticks.push(v);
            return ticks;
        }

        function areaSvg(regions, sx, sy, zeroY) {
            return regions.map(region => {
                const pts = region.points;
                const top = pts.map(p => `${sx(p[0]).toFixed(1)},${sy(p[1]).toFixed(1)}`).join(" ");
                const last = pts[pts.length - 1];
                const first = pts[0];
                return `<polygon points="${top} ${sx(last[0]).toFixed(1)},${zeroY.toFixed(1)} ${sx(first[0]).toFixed(1)},${zeroY.toFixed(1)}" fill="${region.color ?? "rgba(224,164,86,.18)"}" stroke="none"/>`;
            }).join("");
        }

        function miniTable(rows) {
            return `<table style="width:100%; border-collapse: collapse; font-size: 1.06rem;">
                ${rows.map((row, ri) => `<tr>${row.map(cell => `<td style="border:1px solid #ded6c9; padding:9px 10px; text-align:center; ${ri===0 ? "font-weight:800; color:#b9833f;" : ""}">${cell}</td>`).join("")}</tr>`).join("")}
            </table>`;
        }

        const slides = [
            {
                type: "cover",
                title: "Clase 2 · Bloque 1",
                subtitle: "Funciones y gráficos posición-tiempo · 40 minutos · PREUV",
                body: raw`$\boxed{\text{Un gráfico no se mira: se lee.}}$`
            },
            {
                title: "Qué debe quedar instalado hoy",
                body: `<div class="grid-3">
                    <div class="card"><strong>1.</strong><br>Leer una función como una historia física.</div>
                    <div class="card"><strong>2.</strong><br>Extraer velocidad desde la pendiente de un gráfico $x-t$.</div>
                    <div class="card"><strong>3.</strong><br>Distinguir desplazamiento, distancia y posición final.</div>
                </div>
                <p class="note">Bloque sin derivadas ni integrales. Solo lectura, pendientes y razonamiento gráfico.</p>`
            },
            {
                title: "La cadena de traducción",
                body: `<div class="grid-2">
                    <div>
                        <div class="formula">$\\text{función}\\longleftrightarrow\\text{tabla}\\longleftrightarrow\\text{gráfico}\\longleftrightarrow\\text{historia}$</div>
                        <div class="list">
                            <div>La función entrega una regla.</div>
                            <div>La tabla muestra datos.</div>
                            <div>El gráfico muestra una relación.</div>
                            <div>La historia física interpreta el movimiento.</div>
                        </div>
                    </div>
                    <div class="visual">${graph([[0,2],[1,5],[2,8],[3,11],[4,14]], {xMax:4, yMin:0, yMax:15, yTicks:[0,3,6,9,12,15], title:"x(t)=2+3t"})}</div>
                </div>`
            },
            {
                title: "Regla de oro para gráficos $x-t$",
                body: `<div class="grid-2">
                    <div>
                        <div class="formula">$v=\\dfrac{\\Delta x}{\\Delta t}$</div>
                        <div class="list">
                            <div>En un gráfico posición-tiempo, la pendiente es velocidad.</div>
                            <div>Una pendiente positiva indica movimiento al sentido positivo.</div>
                            <div>Una pendiente negativa indica movimiento al sentido negativo.</div>
                            <div>Una pendiente cero indica reposo.</div>
                        </div>
                    </div>
                    <div class="visual">${graph([[0,1],[4,9]], {xMax:4, yMin:0, yMax:10, yTicks:[0,2,4,6,8,10], title:"pendiente positiva"})}</div>
                </div>`
            },
            exercise(1, "Básico", "Función directa", raw`Un móvil se mueve según $x(t)=4+2t$, con $x$ en metros y $t$ en segundos.`, [
                raw`Calcula $x(0)$, $x(3)$ y $x(6)$.`,
                raw`Identifica $x_0$ y $v$.`,
                "Interpreta la historia física en una frase."
            ], graph([[0,4],[1,6],[2,8],[3,10],[4,12],[5,14],[6,16]], {xMax:6, yMin:0, yMax:18, yTicks:[0,3,6,9,12,15,18], title:"Ejercicio 1"})),
            solution("Ejercicio 1", [
                raw`$x(0)=4\,\mathrm{m}$, $x(3)=10\,\mathrm{m}$, $x(6)=16\,\mathrm{m}$.`,
                raw`Comparando con $x(t)=x_0+vt$: $x_0=4\,\mathrm{m}$ y $v=2\,\mathrm{m/s}$.`,
                "Historia: parte 4 m a la derecha del origen y avanza 2 m cada segundo."
            ]),
            exercise(2, "Básico", "Tabla a velocidad", "La tabla muestra la posición de un móvil en distintos instantes.", [
                raw`Determina si el movimiento es uniforme.`,
                raw`Calcula la velocidad.`,
                "Indica si avanza al sentido positivo o negativo."
            ], `<div class="visual">${miniTable([["t (s)", "0", "1", "2", "3", "4"], ["x (m)", "10", "7", "4", "1", "-2"]])}${graph([[0,10],[1,7],[2,4],[3,1],[4,-2]], {xMax:4, yMin:-4, yMax:12, yTicks:[-4,0,4,8,12], title:"tabla representada"})}</div>`),
            solution("Ejercicio 2", [
                raw`Los cambios son $7-10=-3$, $4-7=-3$, $1-4=-3$, $-2-1=-3$.`,
                raw`Como cada intervalo dura $1\,\mathrm{s}$, $v=-3\,\mathrm{m/s}$.`,
                "Es MRU y se mueve en el sentido negativo."
            ]),
            exercise(3, "Intermedio", "Gráfico por tramos", "El gráfico representa la posición de un móvil durante 7 segundos.", [
                "Calcula la velocidad en cada tramo.",
                "Determina el desplazamiento total.",
                "Determina la distancia total recorrida."
            ], graph([[0,0],[2,6],[5,6],[7,-2]], {xMax:7, yMin:-4, yMax:8, yTicks:[-4,-2,0,2,4,6,8], labels:["A","B","C","D"], title:"Ejercicio 3"})),
            solution("Ejercicio 3", [
                raw`Tramo $0$ a $2$: $v=(6-0)/(2-0)=3\,\mathrm{m/s}$.`,
                raw`Tramo $2$ a $5$: $v=0\,\mathrm{m/s}$, está en reposo.`,
                raw`Tramo $5$ a $7$: $v=(-2-6)/(7-5)=-4\,\mathrm{m/s}$.`,
                raw`Desplazamiento total: $x_f-x_i=-2-0=-2\,\mathrm{m}$.`,
                raw`Distancia total: $6+0+8=14\,\mathrm{m}$.`
            ]),
            {
                title: "Pausa conceptual: desplazamiento no es distancia",
                body: `<div class="grid-2">
                    <div class="card">
                        <div class="formula">$\\Delta x=x_f-x_i$</div>
                        <p class="problem-text">El desplazamiento solo mira inicio y final. Puede ser positivo, negativo o cero.</p>
                    </div>
                    <div class="card">
                        <div class="formula">$d=\\text{camino total recorrido}$</div>
                        <p class="problem-text">La distancia suma todos los tramos. Nunca es negativa.</p>
                    </div>
                </div>
                <p class="note">Este error aparece muchísimo: volver al inicio no significa no haberse movido.</p>`
            },
            exercise(4, "Intermedio", "Reposo y cambio de sentido", "El movimiento se describe con el siguiente gráfico posición-tiempo.", [
                "¿En qué intervalo está detenido?",
                "¿En qué intervalos se mueve en sentido negativo?",
                "Calcula desplazamiento total y distancia recorrida."
            ], graph([[0,2],[2,8],[4,8],[6,2],[8,-2]], {xMax:8, yMin:-4, yMax:10, yTicks:[-4,-2,0,2,4,6,8,10], labels:["","","","",""], title:"Ejercicio 4"})),
            solution("Ejercicio 4", [
                raw`Está detenido entre $t=2\,\mathrm{s}$ y $t=4\,\mathrm{s}$ porque $x$ no cambia.`,
                raw`Se mueve en sentido negativo entre $4$ y $8\,\mathrm{s}$ porque la posición disminuye.`,
                raw`Desplazamiento: $x_f-x_i=-2-2=-4\,\mathrm{m}$.`,
                raw`Distancia: $|8-2|+|8-8|+|2-8|+|-2-2|=6+0+6+4=16\,\mathrm{m}$.`
            ]),
            exercise(5, "Intermedio", "Encuentro de dos móviles", raw`Dos móviles se mueven en la misma recta: $x_A(t)=2+3t$ y $x_B(t)=14-t$.`, [
                "¿En qué instante se encuentran?",
                "¿En qué posición se encuentran?",
                "Interpreta por qué uno tiene velocidad negativa."
            ], multiGraph([
                { name: "A", color: "#e0a456", points: [[0,2],[4,14]] },
                { name: "B", color: "#2c8da0", points: [[0,14],[4,10]] }
            ], {xMax:4, yMin:0, yMax:16, yTicks:[0,4,8,12,16], title:"Ejercicio 5"})),
            solution("Ejercicio 5", [
                raw`Encuentro: $2+3t=14-t$.`,
                raw`$4t=12$, luego $t=3\,\mathrm{s}$.`,
                raw`Posición: $x_A(3)=2+9=11\,\mathrm{m}$.`,
                raw`$B$ tiene $v=-1\,\mathrm{m/s}$: se mueve hacia posiciones menores.`
            ]),
            exercise(6, "Intermedio", "Ecuación de cada tramo", "A partir del gráfico, construye la función por tramos.", [
                "Calcula la velocidad de cada tramo.",
                "Escribe la ecuación del tramo 0 a 2 s.",
                "Escribe la ecuación del tramo 2 a 6 s."
            ], graph([[0,-4],[2,0],[6,8]], {xMax:6, yMin:-6, yMax:10, yTicks:[-6,-4,-2,0,2,4,6,8,10], labels:["A","B","C"], title:"Ejercicio 6"})),
            solution("Ejercicio 6", [
                raw`Tramo $0$ a $2$: $v=(0-(-4))/(2-0)=2\,\mathrm{m/s}$. Entonces $x(t)=-4+2t$.`,
                raw`Tramo $2$ a $6$: $v=(8-0)/(6-2)=2\,\mathrm{m/s}$.`,
                raw`Como pasa por $(2,0)$: $x(t)=2(t-2)=2t-4$.`,
                "En realidad ambos tramos están sobre la misma recta: es un solo MRU."
            ]),
            exercise(7, "Intermedio", "Viaje de ida y vuelta", raw`Un móvil parte en $x=-3\,\mathrm{m}$, llega a $x=5\,\mathrm{m}$ en $4\,\mathrm{s}$ y luego vuelve hasta $x=1\,\mathrm{m}$ en $2\,\mathrm{s}$ más.`, [
                "Calcula el desplazamiento total.",
                "Calcula la distancia recorrida.",
                "Calcula la velocidad promedio del viaje completo."
            ], graph([[0,-3],[4,5],[6,1]], {xMax:6, yMin:-4, yMax:6, yTicks:[-4,-2,0,2,4,6], labels:["inicio","ida","final"], title:"Ejercicio 7"})),
            solution("Ejercicio 7", [
                raw`Desplazamiento total: $x_f-x_i=1-(-3)=4\,\mathrm{m}$.`,
                raw`Distancia recorrida: $|5-(-3)|+|1-5|=8+4=12\,\mathrm{m}$.`,
                raw`Tiempo total: $6\,\mathrm{s}$. Velocidad promedio: $v_{\mathrm{prom}}=4/6=0.67\,\mathrm{m/s}$.`
            ]),
            exercise(8, "Intermedio", "Detectar si es MRU", "La tabla muestra posiciones medidas cada segundo.", [
                "¿Es MRU? Justifica.",
                "Calcula la velocidad promedio entre 0 y 4 s.",
                "¿En qué intervalo de 1 s avanzó más?"
            ], `<div class="visual">${miniTable([["t (s)", "0", "1", "2", "3", "4"], ["x (m)", "0", "1", "4", "9", "16"]])}${graph([[0,0],[1,1],[2,4],[3,9],[4,16]], {xMax:4, yMin:0, yMax:18, yTicks:[0,3,6,9,12,15,18], title:"Ejercicio 8"})}</div>`),
            solution("Ejercicio 8", [
                raw`Cambios por segundo: $1$, $3$, $5$, $7\,\mathrm{m}$. No son iguales, por tanto no es MRU.`,
                raw`Velocidad promedio total: $v_{\mathrm{prom}}=(16-0)/(4-0)=4\,\mathrm{m/s}$.`,
                raw`Avanzó más entre $3$ y $4\,\mathrm{s}$: avanzó $7\,\mathrm{m}$.`
            ]),
            exercise(9, "Desafío", "Velocidad media en intervalos", "Usa el gráfico curvo aproximado. No calcules tangentes: solo usa intervalos.", [
                raw`Calcula $v_{\mathrm{prom}}$ entre $1$ y $3\,\mathrm{s}$.`,
                raw`Calcula $v_{\mathrm{prom}}$ entre $3$ y $4\,\mathrm{s}$.`,
                "¿La rapidez parece aumentar o disminuir?"
            ], graph([[0,0],[1,1],[2,4],[3,9],[4,16]], {xMax:4, yMin:0, yMax:18, yTicks:[0,3,6,9,12,15,18], title:"Ejercicio 9"}) ),
            solution("Ejercicio 9", [
                raw`Entre $1$ y $3$: $v_{\mathrm{prom}}=(9-1)/(3-1)=4\,\mathrm{m/s}$.`,
                raw`Entre $3$ y $4$: $v_{\mathrm{prom}}=(16-9)/(4-3)=7\,\mathrm{m/s}$.`,
                "La rapidez aumenta porque en intervalos iguales la posición cambia cada vez más."
            ]),
            exercise(10, "Desafío PAES", "Lectura completa de gráfico", "El gráfico resume el recorrido de un móvil durante 13 segundos.", [
                "Calcula la velocidad en cada tramo.",
                "Identifica los intervalos de reposo.",
                "Calcula desplazamiento, distancia total y velocidad promedio total."
            ], graph([[0,0],[3,12],[5,12],[9,-4],[11,-4],[13,4]], {xMax:13, yMin:-6, yMax:14, yTicks:[-6,-2,2,6,10,14], labels:["A","B","C","D","E","F"], title:"Ejercicio 10"}) ),
            solution("Ejercicio 10", [
                raw`$0$ a $3$: $v=12/3=4\,\mathrm{m/s}$.`,
                raw`$3$ a $5$: $v=0$, reposo.`,
                raw`$5$ a $9$: $v=(-4-12)/(9-5)=-4\,\mathrm{m/s}$.`,
                raw`$9$ a $11$: $v=0$, reposo.`,
                raw`$11$ a $13$: $v=(4-(-4))/(13-11)=4\,\mathrm{m/s}$.`,
                raw`Desplazamiento: $4-0=4\,\mathrm{m}$. Distancia: $12+0+16+0+8=36\,\mathrm{m}$.`,
                raw`Velocidad promedio total: $4/13=0.31\,\mathrm{m/s}$.`
            ]),
            {
                title: "Resumen del bloque 1",
                body: `<div class="grid-3">
                    <div class="card"><strong>Función</strong><br>$x(t)$ dice la posición para cada instante.</div>
                    <div class="card"><strong>Pendiente</strong><br>En $x-t$, la pendiente es velocidad.</div>
                    <div class="card"><strong>Camino</strong><br>Desplazamiento no es lo mismo que distancia.</div>
                </div>
                <div class="formula" style="margin-top:26px;">$\\boxed{v=\\dfrac{\\Delta x}{\\Delta t}}$</div>
                <p class="note">Siguiente bloque: gráfico velocidad-tiempo, área bajo la curva y desplazamiento acumulado.</p>`
            },
            {
                title: "Pauta de 40 minutos",
                body: `<div class="list">
                    <div>0-6 min: recordar función, tabla y gráfico.</div>
                    <div>6-12 min: pendiente en $x-t$.</div>
                    <div>12-26 min: ejercicios 1 al 6 con discusión rápida.</div>
                    <div>26-36 min: ejercicios 7 al 10.</div>
                    <div>36-40 min: resumen y puente al área bajo $v-t$.</div>
                </div>`
            }
        ];

        function exercise(n, level, topic, statement, asks, visual) {
            return {
                title: `Ejercicio ${n}`,
                body: `<div class="exercise">
                    <div>
                        <div class="badge-row">
                            <span class="badge level">${level}</span>
                            <span class="badge">${topic}</span>
                            <span class="badge">original estilo Serway/PAES</span>
                        </div>
                        <p class="problem-text">${statement}</p>
                        <div class="asks">${asks.map((ask, idx) => `<div>${String.fromCharCode(97 + idx)}) ${ask}</div>`).join("")}</div>
                    </div>
                    <div class="visual">${visual}</div>
                </div>`
            };
        }

        function solution(title, steps) {
            return {
                title: `Solución · ${title}`,
                body: `<div class="solution-box">${steps.map(step => `<div class="step">${step}</div>`).join("")}</div>`
            };
        }

        const deck = document.getElementById("deck");

        slides.forEach((slide, index) => {
            const el = document.createElement("section");
            el.className = `slide ${index === 0 ? "present" : "future"} ${slide.type === "cover" ? "cover" : ""}`;
            const content = document.createElement("div");
            content.className = "content";
            if (slide.type === "cover") {
                content.innerHTML = `<div class="eyebrow">PREUV · Profesor Joaquín Saldaño</div><h1>${slide.title}</h1><p class="subtitle">${slide.subtitle}</p><div class="divider"></div><div class="formula">${slide.body}</div>`;
            } else {
                content.innerHTML = `<div class="eyebrow">Clase 2 · Bloque 1 · Gráficos $x-t$</div><h2>${slide.title}</h2>${slide.body}`;
            }
            el.appendChild(content);
            deck.appendChild(el);
        });

        const slideEls = Array.from(document.querySelectorAll(".slide"));
        let current = 0;
        document.getElementById("total").textContent = slideEls.length;

        function show(index) {
            current = Math.max(0, Math.min(slideEls.length - 1, index));
            slideEls.forEach((slide, i) => {
                slide.classList.toggle("present", i === current);
                slide.classList.toggle("past", i < current);
                slide.classList.toggle("future", i > current);
            });
            document.getElementById("current").textContent = current + 1;
        }

        document.getElementById("next").addEventListener("click", () => show(current + 1));
        document.getElementById("prev").addEventListener("click", () => show(current - 1));
        document.addEventListener("keydown", (event) => {
            if (["ArrowRight", " ", "PageDown"].includes(event.key)) show(current + 1);
            if (["ArrowLeft", "PageUp"].includes(event.key)) show(current - 1);
            if (event.key === "Home") show(0);
            if (event.key === "End") show(slideEls.length - 1);
        });

        window.goToSlide = (index) => show(index);

        window.addEventListener("load", () => {
            if (window.renderMathInElement) {
                renderMathInElement(document.body, {
                    delimiters: [
                        { left: "$$", right: "$$", display: true },
                        { left: "$", right: "$", display: false },
                        { left: "\\(", right: "\\)", display: false },
                        { left: "\\[", right: "\\]", display: true }
                    ],
                    throwOnError: false
                });
            }
        });
    </script>
</body>
</html>
