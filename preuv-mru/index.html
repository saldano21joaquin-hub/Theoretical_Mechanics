<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREUV — Movimiento Rectilíneo Uniforme</title>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/contrib/auto-render.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #ffffff;
            color: #2c2c2c;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .presentation-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
            background: #ffffff;
        }

        .slide {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: absolute;
            inset: 0;
            padding: 38px 52px 100px;
            overflow: hidden;
            background: linear-gradient(to bottom, #ffffff 0%, #f5f1e8 100%);
            opacity: 0;
            transform: translateX(100%);
            transition: transform 0.58s cubic-bezier(0.26, 0.86, 0.44, 0.985), opacity 0.32s ease;
            pointer-events: none;
        }

        .slide.present {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .slide.past {
            opacity: 0;
            transform: translateX(-100%);
        }

        .slide.future {
            opacity: 0;
            transform: translateX(100%);
        }

        .slide::after {
            content: '';
            position: absolute;
            top: 18px;
            left: 18px;
            right: 18px;
            bottom: 92px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            pointer-events: none;
            z-index: 0;
        }

        .slide-content {
            position: relative;
            z-index: 1;
            width: min(1180px, 100%);
            text-align: center;
        }

        .eyebrow {
            color: #b78b4d;
            font-size: 0.98rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .slide-title {
            color: #2c2c2c;
            font-size: 2.15rem;
            line-height: 1.18;
            margin-bottom: 20px;
        }

        .portada-title {
            font-size: 3.3rem;
            line-height: 1.1;
            margin-bottom: 18px;
        }

        .portada-subtitle {
            color: #5a5a5a;
            font-size: 1.42rem;
            line-height: 1.45;
            max-width: 920px;
            margin: 0 auto;
        }

        .divider {
            width: 190px;
            height: 3px;
            margin: 28px auto;
            background: linear-gradient(to right, transparent, #e0a456, transparent);
        }

        .content-list {
            list-style: none;
            max-width: 1020px;
            margin: 0 auto;
            text-align: left;
            font-size: 1.16rem;
            line-height: 1.58;
        }

        .content-list li {
            position: relative;
            margin-bottom: 8px;
            padding-left: 24px;
        }

        .content-list li::before {
            content: '—';
            position: absolute;
            left: 0;
            color: #b78b4d;
        }

        .content-list li:has(.katex),
        .content-list li.boxed-line {
            padding-left: 0;
            text-align: center;
        }

        .content-list li:has(.katex)::before,
        .content-list li.boxed-line::before {
            content: '';
        }

        .boxed-line {
            margin: 18px auto 0;
            padding-top: 12px;
            border-top: 1px solid rgba(224, 164, 86, 0.35);
            font-weight: 700;
        }

        .visual {
            margin: 26px auto 0;
            width: min(780px, 95%);
        }

        .visual svg,
        .visual img {
            width: 100%;
            height: auto;
            display: block;
        }

        .visual img {
            max-height: 430px;
            object-fit: contain;
            border-radius: 6px;
        }

        .compact .slide-title { font-size: 1.82rem; }
        .compact .content-list { font-size: 1.02rem; line-height: 1.42; }

        .fragment {
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.24s ease, transform 0.24s ease;
        }

        .fragment.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .slide-counter {
            position: fixed;
            bottom: 28px;
            left: 48px;
            z-index: 10;
            color: #888888;
            font-family: monospace;
            font-size: 0.98rem;
        }

        .navigation {
            position: fixed;
            right: 48px;
            bottom: 22px;
            z-index: 10;
            display: flex;
            gap: 10px;
        }

        .nav-button {
            width: 42px;
            height: 34px;
            border: 1px solid #d8d8d8;
            border-radius: 5px;
            background: rgba(255,255,255,0.92);
            color: #2c2c2c;
            font-size: 1.25rem;
            cursor: pointer;
        }

        .nav-button:hover { background: #f5f1e8; }
        .katex-display { margin: 0.22em 0; overflow-x: auto; overflow-y: hidden; }

        @media (max-width: 900px) {
            .slide { padding: 32px 24px 92px; }
            .slide-title { font-size: 1.55rem; }
            .portada-title { font-size: 2.35rem; }
            .content-list { font-size: 0.98rem; }
            .navigation { right: 24px; }
            .slide-counter { left: 24px; }
        }
    </style>
</head>
<body>
    <div class="presentation-container" id="deck"></div>

    <div class="slide-counter">
        <span id="current-slide">1</span> / <span id="total-slides">30</span>
    </div>

    <div class="navigation">
        <button class="nav-button" id="prev-btn">←</button>
        <button class="nav-button" id="next-btn">→</button>
    </div>

    <script>
        const raw = String.raw;
        const slidesData = [
            { type: 'Portada', title: 'Movimiento Rectilíneo Uniforme', subtitle: '¿Cómo transformamos el movimiento real en una descripción matemática?' },
            { title: '¿Cómo describimos el movimiento?', items: [

        };

        const deck = document.getElementById('deck');
        let currentSlide = 0;

        function createSlide(data, index) {
            const slide = document.createElement('div');
            slide.className = `slide ${data.compact ? 'compact' : ''}`;
            const content = document.createElement('div');
            content.className = 'slide-content';

            if (data.type === 'Portada') {
                const h1 = document.createElement('h1');
                h1.className = 'portada-title';
                h1.textContent = data.title;
                const sub = document.createElement('p');
                sub.className = 'portada-subtitle';
                sub.textContent = data.subtitle;
                const divider = document.createElement('div');
                divider.className = 'divider';
                content.append(h1, sub, divider);
            } else {
                const eyebrow = document.createElement('div');
                eyebrow.className = 'eyebrow';
                eyebrow.textContent = 'MRU';
                const h1 = document.createElement('h1');
                h1.className = 'slide-title';
                h1.textContent = data.title;
                const list = document.createElement('ul');
                list.className = 'content-list';
                data.items.forEach((item) => {
                    const li = document.createElement('li');
                    li.textContent = item;
                    if (item.includes('\\boxed')) li.classList.add('boxed-line');
                    list.appendChild(li);
                });
                content.append(eyebrow, h1, list);
            }

            if (data.visual && visuals[data.visual]) {
                const visual = document.createElement('div');
                visual.className = 'visual fragment';
                visual.innerHTML = visuals[data.visual];
                content.appendChild(visual);
            }

            slide.appendChild(content);
            slide.classList.add(index === 0 ? 'present' : 'future');
            return slide;
        }

        slidesData.forEach((data, index) => deck.appendChild(createSlide(data, index)));

        const slides = Array.from(document.querySelectorAll('.slide'));
        const totalSlides = slides.length;
        document.getElementById('total-slides').textContent = totalSlides;

        function prepareFragments() {
            slides.forEach((slide) => {
                slide.querySelectorAll('.content-list li').forEach((element) => {
                    element.classList.add('fragment');
                });
            });
        }

        function getFragments(slide) {
            return Array.from(slide.querySelectorAll('.fragment'));
        }

        function revealAll(slide) {
            getFragments(slide).forEach((fragment) => fragment.classList.add('visible'));
        }

        function resetFragments(slide) {
            getFragments(slide).forEach((fragment) => fragment.classList.remove('visible'));
        }

        function showSlide(n) {
            currentSlide = (n + totalSlides) % totalSlides;
            slides.forEach((slide, index) => {
                slide.classList.remove('past', 'present', 'future');
                if (index < currentSlide) slide.classList.add('past');
                else if (index === currentSlide) slide.classList.add('present');
                else slide.classList.add('future');
            });
            resetFragments(slides[currentSlide]);
            document.getElementById('current-slide').textContent = currentSlide + 1;
        }

        function nextSlide() {
            const fragments = getFragments(slides[currentSlide]);
            const nextFragment = fragments.find((fragment) => !fragment.classList.contains('visible'));
            if (nextFragment) {
                nextFragment.classList.add('visible');
                return;
            }
            showSlide(currentSlide + 1);
        }

        function prevSlide() {
            const fragments = getFragments(slides[currentSlide]);
            const visibleFragments = fragments.filter((fragment) => fragment.classList.contains('visible'));
            if (visibleFragments.length > 0) {
                visibleFragments[visibleFragments.length - 1].classList.remove('visible');
                return;
            }
            showSlide(currentSlide - 1);
            revealAll(slides[currentSlide]);
        }

        document.getElementById('next-btn').addEventListener('click', nextSlide);
        document.getElementById('prev-btn').addEventListener('click', prevSlide);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'ArrowDown') {
                e.preventDefault();
                nextSlide();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                prevSlide();
            }
        });

        document.addEventListener('click', function(e) {
            if (e.target.closest('button, a')) return;
            if (e.target.closest('.slide.present')) nextSlide();
        });

        prepareFragments();
        showSlide(0);

        document.addEventListener('DOMContentLoaded', function() {
            renderMathInElement(document.body, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false},
                    {left: '\\(', right: '\\)', display: false},
                    {left: '\\[', right: '\\]', display: true}
                ],
                throwOnError: false
            });
        });
    </script>
